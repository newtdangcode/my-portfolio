server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    
    # Default file formats
    index index.html index.htm;

    # GZip Optimization for SEO/Speed
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        # Serve exact file, or append .html, or folder index, or 404 NOT index.html!
        try_files $uri $uri.html $uri/ =404;
    }

    # IMPORTANT: Never cache HTML files so F5 always gets the latest JS chunk references
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Next.js static assets can be cached aggressively since they contain unique hashes
    location /_next/static/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Standard error handling
    error_page 404 /404.html;
    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
